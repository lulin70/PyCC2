name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.3.38)'
        required: true
        default: '0.3.38'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Quality Gate — Run Tests
        run: |
          pip install -e ".[dev]"
          pytest tests/ -q --tb=line --maxfail=10

      - name: Build Package (sdist + wheel)
        run: python -m build

      - name: Extract Version & Changelog
        id: meta
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Extract changelog for this version from CHANGELOG.md
          # Format: ## [VERSION] - DATE ... content ... ## [NEXT_VERSION]
          if [ -f CHANGELOG.md ]; then
            CHANGELOG=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | head -n -1)
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: PyCC2 v${{ steps.meta.outputs.version }}
          body: ${{ steps.meta.outputs.changelog }}
          draft: false
          prerelease: false
          files: |
            dist/*.tar.gz
            dist/*.whl
