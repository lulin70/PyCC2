name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.3.42)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Quality Gate — Lint & Type Check
        run: |
          pip install -r requirements-dev.lock
          pip install -e . --no-deps
          ruff check .
          MYPYPATH=src mypy -p pycc2 --no-error-summary
          bandit -r src/ -ll --skip B101,B311,B601

      - name: Quality Gate — Run Tests
        run: |
          pytest tests/ -q --tb=line --maxfail=10

      - name: Verify document version consistency
        run: |
          chmod +x scripts/check_doc_consistency.sh
          ./scripts/check_doc_consistency.sh

      - name: Verify version consistency
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Tag version $TAG_VERSION != pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi

      - name: Build Package (sdist + wheel)
        run: python -m build

      - name: Extract Version & Changelog
        id: meta
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Extract changelog for this version from CHANGELOG.md
          # Format: ## vVERSION — TITLE (DATE) ... content ... ## vNEXT_VERSION
          if [ -f CHANGELOG.md ]; then
            CHANGELOG=$(sed -n "/^## v$VERSION/,/^## v/p" CHANGELOG.md | head -n -1)
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Determine prerelease status
        id: prerelease
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if echo "$TAG_VERSION" | grep -qE '-(rc|beta|alpha)'; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: PyCC2 v${{ steps.meta.outputs.version }}
          body: ${{ steps.meta.outputs.changelog }}
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: |
            dist/*.tar.gz
            dist/*.whl

      - name: Upload dist artifacts for PyPI publish
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: dist-packages
          path: |
            dist/*.tar.gz
            dist/*.whl

  publish-pypi:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-packages
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install twine
        run: |
          python -m pip install --upgrade pip
          pip install twine

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
