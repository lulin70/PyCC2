name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies (pinned via requirements-dev.lock)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Run ruff linter
        run: ruff check .

      - name: Run ruff formatter
        run: ruff format --check .

      - name: Run mypy type checking
        run: MYPYPATH=src mypy -p pycc2 --no-error-summary

      - name: Security scan
        run: |
          pip install "bandit>=1.9,<2.0"
          bandit -r src/ -ll --skip B101,B311,B601

      - name: Dependency vulnerability audit
        run: |
          pip install 'pip-audit>=2.7'
          pip-audit --desc 2>&1 | tee pip-audit-report.txt

  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies (pinned via requirements-dev.lock)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            -m "not slow" \
            --cov=src/pycc2 \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=50 \
            --deselect "tests/unit/test_sprite_renderer.py::TestVPNumeralRendering::test_vl_flag_renders_vp_numeral_with_points" \
            --junitxml=junit.xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results-${{ matrix.python-version }}
          path: |
            junit.xml
            htmlcov/

  integration-tests:
    name: Integration Tests (Python 3.12)
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies (pinned via requirements-dev.lock)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -m "not slow" \
            --timeout=120 \
            --junitxml=junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: junit.xml

  e2e-tests:
    name: E2E Tests (Python 3.12)
    needs: integration-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SKIP_E2E: "0"
      SDL_VIDEODRIVER: dummy
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') || github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies (pinned via requirements-dev.lock)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Run e2e tests (SKIP_E2E=1 to skip)
        run: |
          if [ "${SKIP_E2E:-0}" = "1" ]; then
            echo "SKIP_E2E=1 — skipping E2E tests"
            exit 0
          fi
          pytest tests/e2e/ \
            -m "not slow" \
            --timeout=300 \
            --ignore=tests/e2e/test_real_gameplay_e2e.py \
            --junitxml=junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: junit.xml

  slow-tests:
    name: Slow Tests (Python 3.12)
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies (pinned via requirements-dev.lock)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Run slow tests
        env:
          SDL_VIDEODRIVER: dummy
        run: |
          pytest tests/ -m slow -v --junitxml=junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: slow-test-results
          path: junit.xml

  benchmark:
    name: Benchmark (Python 3.12)
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies (pinned via requirements-dev.lock)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Run performance benchmarks
        env:
          SDL_VIDEODRIVER: dummy
        run: |
          pytest tests/benchmark/ -v --junitxml=junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-test-results
          path: junit.xml

  docker-build:
    name: Docker Build
    needs: [unit-tests, integration-tests, e2e-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t pycc2-test .

      - name: Run tests in Docker
        run: docker run --rm pycc2-test
