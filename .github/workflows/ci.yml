name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # V-07 Wave D5: Weekly visual regression run (Monday 06:00 UTC)
    # Non-blocking for PRs; runs separately to detect visual drift over time.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies (pinned via requirements-dev.lock)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Run ruff linter
        run: ruff check .

      - name: Run ruff formatter
        run: ruff format --check .

      - name: Run mypy type checking
        run: MYPYPATH=src mypy -p pycc2 --no-error-summary

      - name: Security scan
        run: |
          pip install "bandit>=1.9,<2.0"
          bandit -c bandit.yaml -r src/ -ll

      - name: Dependency vulnerability audit
        run: |
          set -o pipefail
          pip install 'pip-audit>=2.7'
          pip-audit -r requirements-dev.lock --strict --desc 2>&1 | tee pip-audit-report.txt

      - name: Cyclomatic complexity check (radon)
        run: |
          radon cc src/ -n E -s | tee complexity-report.txt
          current_count=$(radon cc src/ -n E -j | python3 -c "import json,sys; data=json.load(sys.stdin); print(sum(len(blocks) for blocks in data.values()))")
          BASELINE=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['radon']['cc_baseline'])")
          if [ "$current_count" -gt "$BASELINE" ]; then
            echo "::error::Complexity regression: $current_count E+ violations (baseline: $BASELINE from pyproject.toml [tool.radon]). New complex functions introduced."
            exit 1
          elif [ "$current_count" -lt "$BASELINE" ]; then
            echo "::notice::Complexity improvement: $current_count E+ violations (baseline: $BASELINE). Update cc_baseline in pyproject.toml [tool.radon]."
          else
            echo "Complexity stable: $current_count E+ violations (baseline: $BASELINE from pyproject.toml)"
          fi

      - name: Document version consistency check
        run: |
          chmod +x scripts/check_doc_consistency.sh
          ./scripts/check_doc_consistency.sh

  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies (pinned via requirements-dev.lock)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            -m "not slow" \
            --cov=src/pycc2 \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=70 \
            --junitxml=junit.xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results-${{ matrix.python-version }}
          path: |
            junit.xml
            htmlcov/

  integration-tests:
    name: Integration Tests (Python 3.12)
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies (pinned via requirements-dev.lock)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -m "not slow" \
            --timeout=120 \
            --junitxml=junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: junit.xml

  e2e-tests:
    name: E2E Tests (Python 3.12)
    needs: integration-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SKIP_E2E: "0"
      SDL_VIDEODRIVER: dummy
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') || github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies (pinned via requirements-dev.lock)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Run e2e tests (SKIP_E2E=1 to skip)
        run: |
          if [ "${SKIP_E2E:-0}" = "1" ]; then
            echo "SKIP_E2E=1 — skipping E2E tests"
            exit 0
          fi
          pytest tests/e2e/ \
            -m "not slow" \
            -p no:randomly \
            --timeout=300 \
            --junitxml=junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: junit.xml

  slow-tests:
    name: Slow Tests (Python 3.12)
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies (pinned via requirements-dev.lock)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Run slow tests
        env:
          SDL_VIDEODRIVER: dummy
        run: |
          pytest tests/ -m slow -v --junitxml=junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: slow-test-results
          path: junit.xml

  benchmark:
    name: Benchmark (Python 3.12)
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') || github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies (pinned via requirements-dev.lock)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Run performance benchmarks
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          pytest tests/benchmark/ -v --junitxml=junit.xml

      - name: Run FPS baseline (V-04 relative regression)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          pytest tests/benchmark/test_fps_baseline.py -v --benchmark-only

      # Note: To update perf_baseline.json, run locally:
      #   python scripts/update_perf_baseline.py --commit
      # Then push the commit. Do NOT auto-update in CI (prevents baseline drift).

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-test-results
          path: junit.xml

  docker-build:
    name: Docker Build
    needs: [unit-tests, integration-tests, e2e-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t pycc2-test .

      - name: Run tests in Docker
        run: docker run --rm pycc2-test

  visual-regression:
    # V-07 Wave D5: Visual regression baseline comparison.
    # Runs weekly (Monday 06:00 UTC via schedule trigger) or on manual dispatch.
    # NOT triggered on every PR (per Wave B-rev design — visual tests are
    # slow and may have platform-specific rendering differences).
    name: Visual Regression (V-07)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    env:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
      SDL_JOYSTICK_DRIVER: dummy
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies (pinned via requirements-dev.lock)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Run visual regression tests
        run: |
          pytest tests/visual_regression/ \
            -v \
            --timeout=120 \
            --junitxml=junit.xml

      - name: Upload diff images on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-diffs
          path: tests/visual_regression/.diff/
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-results
          path: junit.xml
