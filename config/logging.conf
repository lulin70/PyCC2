[loggers]
keys=root,pycc2,combat,ai,rendering

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=detailed,simple

[logger_root]
level=INFO
handlers=consoleHandler,fileHandler

[logger_pycc2]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=pycc2
propagate=0

[logger_combat]
level=DEBUG
handlers=fileHandler
qualname=pycc2.combat
propagate=0

[logger_ai]
level=DEBUG
handlers=fileHandler
qualname=pycc2.ai
propagate=0

[logger_rendering]
level=WARNING
handlers=consoleHandler
qualname=pycc2.rendering
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simple
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=DEBUG
formatter=detailed
args=('pycc2.log', 'a')

[formatter_detailed]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_simple]
format=%(levelname)s: %(message)s
