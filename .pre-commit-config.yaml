# Pre-commit configuration for PyCC2
# See https://pre-commit.com for more information
# Updated 2026-07-13: mypy v1.11.0→v2.1.0 to match requirements-dev.lock (W4-3 CI drift fix)
# Updated 2026-07-05: ruff v0.5.0→v0.15.20 to match requirements-dev.lock (TD-070 fix)

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies: [types-pygame, types-PyYAML]
        exclude: ^tests/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: debug-statements

  - repo: local
    hooks:
      - id: pytest-check
        name: pytest-check
        entry: pytest tests/ -x -q
        language: system
        pass_filenames: false
        always_run: false
        stages: [pre-push]
